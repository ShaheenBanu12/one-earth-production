{% load static %}
<!doctype html>
<html lang="en" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic SEO Title -->
    <title>
        {% block title %}
            One Earth | Sustainability Support for UK SMEs
        {% endblock %}
    </title>

    <!-- Meta Description -->
    <meta name="description" content="{% block meta_description %}Practical sustainability and ESG support for UK SMEs.{% endblock %}">

    <!-- Open Graph (LinkedIn/Facebook Sharing) -->
    <meta property="og:title" content="{% block og_title %}One Earth{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Practical sustainability support for UK SMEs.{% endblock %}">
    <meta property="og:type" content="website">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

    {% include "partials/navbar.html" %}

    <!-- Django Messages -->
    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
                <div class="alert alert-success shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
