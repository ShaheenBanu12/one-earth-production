{% extends "base.html" %}

{% block content %}

<section class="py-5">
    <div class="container">
        <h1 class="mb-5 fw-bold text-center">Insights & Articles</h1>

        <div class="row g-4">

            {% for blog in blogs %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow border-0">
                    <div class="card-body">
                        <h5 class="fw-bold">
                            <a href="{% url 'blog_detail' blog.slug %}" class="text-decoration-none text-dark">
                                {{ blog.title }}
                            </a>
                        </h5>
                        <p class="text-muted small">{{ blog.created_at|date:"F d, Y" }}</p>
                        <p>
                            {{ blog.excerpt|default:blog.content|truncatewords:20 }}
                        </p>
                        <a href="{% url 'blog_detail' blog.slug %}" class="btn btn-sm btn-outline-success">
                            Read More
                        </a>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="text-center">No articles published yet.</p>
            {% endfor %}

        </div>
    </div>
</section>

{% endblock %}
